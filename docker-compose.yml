services:
  vobchat:
    build: .
    container_name: vobchat
    image: vobchat:latest
    ports:
      - 8050:8050
      - 5678:5678
    environment:
      # Database connection (host.docker.internal for external PostgreSQL)
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vobchat}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}

      # Ollama connection (host.docker.internal for external Ollama)
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434

      # Redis connection (internal to container)
      - REDIS_HOST=localhost
      - REDIS_PORT=6379

      # Application settings
      - DASH_DEBUG=true
      - DASH_PREFIX=${DASH_PREFIX:-/}

      # Authentication settings
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///users.db}

    command: ["sh", "-c", "redis-server --port 6379 --bind 127.0.0.1 --protected-mode no --save '' --stop-writes-on-bgsave-error no & exec python -m debugpy --listen 0.0.0.0:5678 --wait-for-client -m flask run --host 0.0.0.0 --port 8050"]

    volumes:
      - ./logs:/app/logs
      - ./src:/app/src

    # Use standard Docker networking
    # network_mode: host

    restart: unless-stopped

