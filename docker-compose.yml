services:
  vobchat:
    build: .
    container_name: vobchat
    image: vobchat:latest
    ports:
      - "127.0.0.1:8050:8050"
    extra_hosts: [ "host.docker.internal:host-gateway" ]
    environment:
      # Database connection (host.docker.internal for external PostgreSQL)
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SCHEMA=${DB_SCHEMA}

      - VOBCHAT_LLM_MODEL=${VOBCHAT_LLM_MODEL}
      - VOBCHAT_LLM_TEMP=${VOBCHAT_LLM_TEMP}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_PORT=${OLLAMA_PORT}
      - OLLAMA_SUBPATH=${OLLAMA_SUBPATH}
      - OLLAMA_USE_SSL=${OLLAMA_USE_SSL}

      # Redis connection (internal to container)
      - REDIS_HOST=localhost
      - REDIS_PORT=6379

      # Application settings
      - DASH_DEBUG=true
      - DASH_URL_BASE_PATHNAME=${DASH_URL_BASE_PATHNAME:-/}

      # Authentication settings
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///users.db}
      - CONVERSATIONAL_AGENT=1

    # command: ["sh", "-c", "redis-server --port 6379 --bind 127.0.0.1 --protected-mode no --save '' --stop-writes-on-bgsave-error no & exec python -m debugpy --listen 0.0.0.0:5678 --wait-for-client -m flask run --host 0.0.0.0 --port 8050"]

    volumes:
      - ./logs:/app/logs
      - ./src:/app/src

    # Use standard Docker networking
    # network_mode: host

    restart: unless-stopped

  #   depends_on:
  #     - redis


